<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREINER FLOREZ - MUNDIAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .content {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 BREINER FLOREZ</h1>
        <div class="subtitle">MUNDIAL</div>
        
        <div class="content">
            <p>¡Bienvenido a mi página de GitHub Pages!</p>

        <div>
            <span class="badge">GitHub</span>
            <span class="badge">Web</span>
            <span class="badge">HTML</span>
        </div>
        
        <div class="footer">
            <p>© 2026 Breiner Florez - Todos los derechos reservados</p>
            <p><a href="https://github.com/breiner12280" style="color: #667eea; text-decoration: none;">Ver en GitHub</a></p>

</html>
